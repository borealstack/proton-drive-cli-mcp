name: OpenSSF Scorecard

on:
  branch_protection_rule:
  push:
    branches:
      - main
  schedule:
    - cron: "34 3 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    if: github.repository == 'borealstack/proton-drive-cli-mcp'
    permissions:
      contents: read
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@f2ea147fec3c2f0d459703eba7405b5e9bcd8c8f # v2.4.2
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          sarif_file: scorecard.sarif
