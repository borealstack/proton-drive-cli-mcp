name: Publish npm

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    name: Publish @borealstack/proton-drive-cli-mcp
    runs-on: ubuntu-latest
    if: github.repository == 'borealstack/proton-drive-cli-mcp'
    permissions:
      attestations: write
      artifact-metadata: write
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: npm ci
      - run: npm run check
      - name: Build GitHub release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          npm pack --json --pack-destination release-assets

          bundle_dir="$(mktemp -d)"
          mkdir -p "$bundle_dir/server" "$bundle_dir/assets"
          cp mcpb/manifest.json "$bundle_dir/manifest.json"
          cp dist/*.js "$bundle_dir/server/"
          cp -R mcpb/assets/. "$bundle_dir/assets/"
          cp package.json package-lock.json LICENSE NOTICE DISCLAIMER.md SECURITY.md "$bundle_dir/"
          npm install --prefix "$bundle_dir" --omit=dev --ignore-scripts
          npx -y @anthropic-ai/mcpb@2.1.2 validate "$bundle_dir/manifest.json"
          npx -y @anthropic-ai/mcpb@2.1.2 pack "$bundle_dir" release-assets/proton-drive-cli-mcp.mcpb

          cd release-assets
          sha256sum *.tgz *.mcpb > SHA256SUMS
      - name: Generate artifact attestations
        id: attest
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-checksums: release-assets/SHA256SUMS
      - name: Upload GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ steps.attest.outputs.bundle-path }}" "release-assets/proton-drive-cli-mcp-${{ github.event.release.tag_name }}.sigstore.json"
          gh release upload "${{ github.event.release.tag_name }}" release-assets/* --clobber
      - name: Publish npm package with provenance
        run: npm publish --access public --provenance
      - name: Install mcp-publisher
        shell: bash
        run: |
          set -euo pipefail
          publisher_version="1.7.9"
          publisher_os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          publisher_arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          publisher_asset="mcp-publisher_${publisher_os}_${publisher_arch}.tar.gz"
          publisher_base="https://github.com/modelcontextprotocol/registry/releases/download/v${publisher_version}"
          curl -L -o "$publisher_asset" "${publisher_base}/${publisher_asset}"
          curl -L -o registry-checksums.txt "${publisher_base}/registry_${publisher_version}_checksums.txt"
          grep "  ${publisher_asset}$" registry-checksums.txt | sha256sum -c -
          tar xzf "$publisher_asset" mcp-publisher
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Publish MCP Registry metadata
        run: ./mcp-publisher publish
