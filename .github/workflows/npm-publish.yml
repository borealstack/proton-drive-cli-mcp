name: Publish npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @borealstack/proton-drive-cli-mcp
    runs-on: ubuntu-latest
    if: github.repository == 'borealstack/proton-drive-cli-mcp'

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: npm ci
      - run: npm run check
      - run: npm publish --access public
